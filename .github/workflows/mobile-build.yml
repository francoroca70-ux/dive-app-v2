name: Mobile app builds (Android + iOS)

# Builds the Capacitor-wrapped native apps in the cloud, so no local Android Studio
# or Mac/Xcode is ever needed. Uses GitHub's own free build runners (macOS included)
# with the GitHub account/repo Fran already has — no new signups for this step.
#
# Run it any time from the Actions tab ("Run workflow"), or it runs automatically
# whenever android/, ios/, index.html, or the Capacitor config changes on main.
#
# What this produces right now:
#   - Android: an installable debug .apk (sideload it on a phone to test), plus
#     a signed release .aab ready to upload to Play Console -- ONLY once the
#     four ANDROID_KEYSTORE_BASE64 / RELEASE_STORE_PASSWORD / RELEASE_KEY_ALIAS /
#     RELEASE_KEY_PASSWORD secrets are added under Settings -> Secrets and
#     variables -> Actions. Until those exist, the release-signing step is
#     skipped automatically and only the debug APK is produced (nothing breaks).
#   - iOS: an unsigned build for the iPhone Simulator (proves the app compiles;
#     an actual installable/testable iPhone build needs an Apple Developer account
#     and signing certificates, which isn't set up yet — see App-Store-Roadmap.md)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'ios/**'
      - 'index.html'
      - 'sw.js'
      - 'manifest.json'
      - 'assets/**'
      - 'capacitor.config.json'
      - 'package.json'

jobs:
  build-android:
    runs-on: ubuntu-latest
    # GitHub Actions doesn't allow the `secrets` context inside a step's `if:`
    # condition directly (that caused runs #16/#17 to fail with "Invalid workflow
    # file" / 0 jobs run) -- the standard workaround is to copy the secret into a
    # job-level env var first, then check that env var in `if:` instead.
    env:
      RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build www/ from the live web app
        run: npm run build:www

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: seven-seas-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Play Console requires a signed .aab, not a debug .apk, for every track
      # including closed testing. This step only runs once the four secrets
      # below exist in the repo -- so it's a no-op (and doesn't fail the build)
      # until Fran adds them.
      - name: Decode release keystore
        id: keystore
        if: ${{ env.RELEASE_KEYSTORE_B64 != '' }}
        working-directory: android/app
        run: |
          echo "Encoded secret length: ${#RELEASE_KEYSTORE_B64} chars (expect ~3816 -- if this is way off, the GitHub secret paste was incomplete)"
          echo "$RELEASE_KEYSTORE_B64" | base64 -d --ignore-garbage > release-upload-key.jks
          echo "Decoded keystore file size:"
          ls -l release-upload-key.jks
          echo "has_keystore=true" >> "$GITHUB_OUTPUT"

      - name: Build signed release AAB
        if: steps.keystore.outputs.has_keystore == 'true'
        working-directory: android
        env:
          # Relative to android/app/build.gradle's own project dir (android/app/),
          # not to this step's working-directory (android/) -- the keystore was
          # decoded to android/app/release-upload-key.jks, so from build.gradle's
          # point of view that's just "release-upload-key.jks", no "app/" prefix.
          RELEASE_STORE_FILE: release-upload-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        if: steps.keystore.outputs.has_keystore == 'true'
        with:
          name: seven-seas-android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build www/ from the live web app
        run: npm run build:www

      - name: Sync Capacitor (iOS)
        run: npx cap sync ios

      # This project uses Swift Package Manager (CapApp-SPM), not CocoaPods — there's no
      # Podfile, so a `pod install` step here would just fail. Xcode resolves the Swift
      # packages automatically as part of the build below.

      - name: Build for iOS Simulator (unsigned — no Apple Developer account needed yet)
        working-directory: ios/App
        run: |
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
